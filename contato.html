<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Contato</h1>
</header>

<nav>
    <a href="index.html">Início</a>
</nav>

<div class="contato-wrapper">
    <div class="contact-card">
        <h3>Entre em Contato</h3>
        <p>Se estiver com algum problema ou quiser tirar dúvidas, envie uma mensagem pelo forms ou através dos nossos e-mails.</p>
        
        <form action="#" method="POST" class="contact-form">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="seu-email@exemplo.com" required>
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua dúvida ou problema aqui..." required></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar Mensagem</button>
        </form>

        <hr class="divisor">

        <div class="suporte-emails">
            <p><strong>E-mails de suporte:</strong></p>
            <ul>
                <li>lkfd1@aluno.ifal.edu.br</li>
                <li>sgs12@aluno.ifal.edu.br</li>
                <li>alrc1@aluno.ifal.edu.br</li>
            </ul>
        </div>
    </div>
</div>

<footer>
    <p>JIFAL - 2026</p>
</footer>

</body>
</html>
